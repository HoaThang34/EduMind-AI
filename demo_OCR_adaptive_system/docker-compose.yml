services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: ocr_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: ocr_app
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_started
    env_file:
      - .env
    ports:
      - "8985:8985"
    volumes:
      - ./data:/app/data
