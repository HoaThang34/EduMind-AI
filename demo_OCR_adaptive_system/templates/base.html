<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ffffff">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

    <title>{% block title %}OCR Adaptive{% endblock %}</title>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Be Vietnam Pro"', 'Inter', 'system-ui', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'ui-monospace', 'SFMono-Regular', 'monospace'],
                    },
                    colors: {
                        border: 'hsl(220 13% 91%)',
                        background: 'hsl(0 0% 100%)',
                        foreground: 'hsl(222 47% 11%)',
                        muted: { DEFAULT: 'hsl(210 20% 96%)', foreground: 'hsl(215 16% 47%)' },
                        accent: { DEFAULT: 'hsl(210 20% 96%)', foreground: 'hsl(222 47% 11%)' },
                        destructive: { DEFAULT: 'hsl(0 72% 51%)', foreground: 'hsl(0 0% 98%)' },
                        primary: { DEFAULT: 'hsl(222 47% 11%)', foreground: 'hsl(0 0% 98%)' },
                    },
                }
            }
        }
    </script>

    <style>
        /* ========= design tokens: orange-grey future tone ========= */
        :root {
            --bg: hsl(30 10% 98%);
            --surface: hsl(0 0% 100%);
            --surface-2: hsl(30 10% 96%);
            --grid: hsl(24 12% 92%);
            --border: hsl(30 8% 88%);
            --border-2: hsl(30 8% 82%);
            --fg: hsl(222 20% 12%);
            --fg-muted: hsl(220 8% 42%);
            --fg-dim: hsl(220 6% 55%);
            --accent: hsl(22 95% 55%);       /* orange */
            --accent-hover: hsl(22 95% 48%);
            --accent-soft: hsl(22 95% 55% / 0.08);
            --accent-soft-2: hsl(22 95% 55% / 0.18);
            --ok: hsl(142 55% 40%);
            --warn: hsl(38 90% 50%);
            --err: hsl(0 70% 52%);
        }

        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: 'Be Vietnam Pro', 'Inter', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            color: var(--fg);
            background:
                linear-gradient(var(--grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid) 1px, transparent 1px),
                var(--bg);
            background-size: 32px 32px;
            background-position: -1px -1px;
        }
        h1, h2, h3, h4 { letter-spacing: -0.015em; }
        .font-mono, pre, code { font-family: 'JetBrains Mono', ui-monospace, monospace; }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
        }
        .panel-header {
            padding: 0.625rem 0.875rem;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            gap: 0.5rem;
            background: var(--surface-2);
            border-top-left-radius: 0.5rem; border-top-right-radius: 0.5rem;
            position: relative;
        }
        .panel-header::before {
            content: ""; position: absolute; top: 0; left: 0.875rem; right: 0.875rem; height: 1px;
            background: linear-gradient(90deg, var(--accent) 0%, transparent 40%);
            opacity: 0.5;
        }
        .panel-title {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--fg-muted);
            display: inline-flex; align-items: center; gap: 0.5rem;
        }
        .panel-body { padding: 0.875rem; }

        .btn-primary {
            background: hsl(222 47% 11%); color: white;
            border: 1px solid hsl(222 47% 11%);
            padding: 0.5rem 0.875rem; border-radius: 0.375rem;
            font-weight: 500; font-size: 0.8125rem; cursor: pointer;
            transition: background 0.12s ease, box-shadow 0.12s ease;
            display: inline-flex; align-items: center; justify-content: center; gap: 0.4rem;
            position: relative;
            box-shadow: inset 0 -2px 0 0 var(--accent);
        }
        .btn-primary:hover { background: hsl(222 47% 20%); box-shadow: inset 0 -2px 0 0 var(--accent-hover); }
        .btn-primary:disabled {
            background: hsl(30 8% 82%); border-color: hsl(30 8% 82%);
            box-shadow: none; cursor: not-allowed;
        }

        .btn-outline {
            background: var(--surface); color: var(--fg);
            border: 1px solid var(--border-2);
            padding: 0.5rem 0.875rem; border-radius: 0.375rem;
            font-weight: 500; font-size: 0.8125rem; cursor: pointer;
            transition: all 0.12s ease;
            display: inline-flex; align-items: center; justify-content: center; gap: 0.4rem;
        }
        .btn-outline:hover { background: var(--surface-2); border-color: var(--accent); color: var(--accent-hover); }
        .btn-outline:disabled { opacity: 0.5; cursor: not-allowed; }

        .input-shadcn {
            width: 100%; padding: 0.5rem 0.625rem;
            border: 1px solid var(--border-2); border-radius: 0.375rem;
            font-size: 0.8125rem; background: var(--surface);
            color: var(--fg); outline: none;
            transition: border-color 0.12s ease, box-shadow 0.12s ease;
        }
        .input-shadcn:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

        .badge {
            display: inline-flex; align-items: center;
            border-radius: 0.25rem;
            padding: 0.1rem 0.45rem;
            font-size: 0.6875rem; font-weight: 600;
            font-family: 'JetBrains Mono', ui-monospace, monospace;
            letter-spacing: 0.02em;
            border: 1px solid transparent;
        }
        .badge-secondary   { background: var(--surface-2); color: var(--fg-muted); border-color: var(--border); }
        .badge-success     { background: hsl(142 40% 96%); color: hsl(142 55% 28%); border-color: hsl(142 30% 82%); }
        .badge-warning     { background: hsl(38 90% 96%); color: hsl(32 80% 30%); border-color: hsl(38 80% 82%); }
        .badge-destructive { background: hsl(0 80% 97%); color: hsl(0 70% 40%); border-color: hsl(0 70% 85%); }
        .badge-indigo      { background: var(--accent-soft); color: var(--accent-hover); border-color: var(--accent-soft-2); }
        .badge-accent      { background: var(--accent); color: white; border-color: var(--accent); }

        .skeleton {
            background: var(--surface-2);
            border-radius: 0.25rem;
            position: relative; overflow: hidden;
        }
        .skeleton::after {
            content: ""; position: absolute; inset: 0;
            background: linear-gradient(90deg, transparent, hsl(0 0% 100% / 0.7), transparent);
            animation: shimmer 1.4s ease-in-out infinite;
        }
        @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .dot-pulse {
            width: 6px; height: 6px; border-radius: 9999px; background: var(--accent);
            box-shadow: 0 0 0 0 var(--accent);
            animation: pulse 1.6s ease-out infinite;
        }
        @keyframes pulse {
            0%   { box-shadow: 0 0 0 0 hsl(22 95% 55% / 0.55); }
            70%  { box-shadow: 0 0 0 8px hsl(22 95% 55% / 0); }
            100% { box-shadow: 0 0 0 0 hsl(22 95% 55% / 0); }
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 9999px; }
        ::-webkit-scrollbar-track { background: transparent; }

        .divider-label {
            display: flex; align-items: center; gap: 0.5rem;
            font-size: 0.6875rem;
            font-weight: 600;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: var(--fg-dim);
        }
        .divider-label::before,
        .divider-label::after {
            content: ""; flex: 1; height: 1px; background: var(--border);
        }

        .kv-row {
            display: grid; grid-template-columns: 120px 1fr; gap: 0.5rem;
            font-size: 0.75rem; padding: 0.25rem 0;
            border-bottom: 1px dashed var(--border);
        }
        .kv-row:last-child { border-bottom: none; }
        .kv-row > span:first-child { color: var(--fg-muted); font-weight: 500; }
        .kv-row > span:last-child { font-family: 'JetBrains Mono', ui-monospace, monospace; color: var(--fg); }

        /* Step timeline */
        .step-row {
            display: grid;
            grid-template-columns: 52px 18px 1fr;
            gap: 0.5rem;
            padding: 0.375rem 0.5rem;
            border-left: 2px solid transparent;
            transition: background 0.12s;
            font-size: 0.75rem;
        }
        .step-row:hover { background: var(--surface-2); }
        .step-row .step-t {
            font-family: 'JetBrains Mono', ui-monospace, monospace;
            color: var(--fg-dim); font-size: 0.6875rem; align-self: start; padding-top: 2px;
        }
        .step-row .step-icon {
            width: 16px; height: 16px; border-radius: 4px; display: flex; align-items: center; justify-content: center;
            font-size: 9px; color: white; align-self: start; margin-top: 2px;
        }
        .step-row .step-icon.info    { background: hsl(220 6% 55%); }
        .step-row .step-icon.start   { background: var(--accent); }
        .step-row .step-icon.ok      { background: var(--ok); }
        .step-row .step-icon.warn    { background: var(--warn); }
        .step-row .step-icon.error   { background: var(--err); }
        .step-row.ok    { border-left-color: var(--ok); }
        .step-row.warn  { border-left-color: var(--warn); }
        .step-row.error { border-left-color: var(--err); }
        .step-row.start { border-left-color: var(--accent); }
        .step-row .step-name {
            font-family: 'JetBrains Mono', ui-monospace, monospace;
            font-size: 0.6875rem; color: var(--fg); font-weight: 600;
        }
        .step-row .step-detail {
            color: var(--fg-muted); font-size: 0.75rem; line-height: 1.35;
            word-break: break-word;
        }

        /* tabs chuyển source (file / camera) */
        .src-tab { color: var(--fg-muted); }
        .src-tab.active { background: var(--accent); color: white; }

        /* mode radio option card */
        .mode-opt {
            display: flex; align-items: flex-start; gap: 0.5rem;
            padding: 0.5rem; border-radius: 0.375rem;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: border-color 0.12s, background 0.12s;
        }
        .mode-opt:hover { border-color: var(--border-2); }
        .mode-opt:has(input:checked) {
            border-color: var(--accent);
            background: var(--accent-soft);
        }

        /* radio accent orange */
        input[type="radio"], input[type="checkbox"] { accent-color: var(--accent); }

        /* container wrapper chung: rộng hơn cho desktop */
        .app-container { max-width: 1400px; margin: 0 auto; padding-left: 0.875rem; padding-right: 0.875rem; }
        @media (min-width: 640px) {
            .app-container { padding-left: 1.5rem; padding-right: 1.5rem; }
        }
        @media (min-width: 1440px) {
            .app-container { max-width: 1500px; }
        }
    </style>
</head>

<body class="min-h-screen">
    <header class="sticky top-0 z-30 backdrop-blur border-b" style="background: hsl(0 0% 100% / 0.9); border-color: var(--border);">
        <div class="app-container h-12 flex items-center justify-between">
            <div class="flex items-center gap-2.5">
                <div class="relative w-7 h-7 rounded border flex items-center justify-center" style="border-color: var(--border-2); background: var(--surface);">
                    <i class="fas fa-circle-nodes text-[11px]" style="color: var(--accent);"></i>
                    <span class="absolute -top-0.5 -right-0.5 w-1.5 h-1.5 rounded-full" style="background: var(--accent); box-shadow: 0 0 6px var(--accent);"></span>
                </div>
                <div class="leading-tight">
                    <div class="text-[13px] font-semibold tracking-tight">OCR Adaptive</div>
                    <div class="text-[10px] font-mono uppercase tracking-wider" style="color: var(--fg-muted);">active_learning_loop</div>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <span id="live-stats" class="inline-flex items-center gap-1.5 px-2 py-1 rounded border text-[11px] font-mono" style="border-color: var(--border-2); background: var(--surface);">
                    <span class="dot-pulse"></span>
                    <span style="color: var(--fg-muted);">rules:</span><span id="stats-rules" class="font-semibold">0</span>
                </span>
            </div>
        </div>
    </header>

    <main class="app-container py-4 sm:py-6 pb-20">
        {% block content %}{% endblock %}
    </main>

    <script>
        async function refreshStats() {
            try {
                const r = await fetch('/api/stats');
                const s = await r.json();
                const el = document.getElementById('stats-rules');
                if (el) el.textContent = s.active_rules ?? 0;
            } catch (e) { /* ignore */ }
        }
        refreshStats();
        setInterval(refreshStats, 8000);
    </script>
</body>

</html>
