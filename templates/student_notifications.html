<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông báo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg bg-white shadow-sm mb-4">
        <div class="container">
            <span class="navbar-brand fw-bold text-primary"><i class="fas fa-bell me-2"></i>Thông báo</span>
            <a href="{{ url_for('student.student_dashboard') }}" class="btn btn-outline-primary btn-sm">Dashboard</a>
        </div>
    </nav>
    <div class="container pb-5">
        {% if notifications %}
        <div class="list-group">
            {% for n in notifications %}
            <div class="list-group-item list-group-item-action flex-column align-items-start {% if not n.is_read %}border-warning border-start border-4{% endif %}">
                <div class="d-flex w-100 justify-content-between">
                    <h6 class="mb-1">{{ n.title }}</h6>
                    <small class="text-muted">{{ n.created_at.strftime('%d/%m/%Y %H:%M') }}</small>
                </div>
                <p class="mb-2 small">{{ n.message }}</p>
                {% if not n.is_read %}
                <form method="POST" action="{{ url_for('student.student_notification_read', nid=n.id) }}" class="d-inline">
                    <button type="submit" class="btn btn-sm btn-outline-secondary">Đánh dấu đã đọc</button>
                </form>
                {% endif %}
            </div>
            {% endfor %}
        </div>
        {% else %}
        <p class="text-muted">Chưa có thông báo.</p>
        {% endif %}
    </div>
</body>
</html>
