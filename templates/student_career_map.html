<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bản đồ ngành – EduMind AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['"Be Vietnam Pro"','system-ui','sans-serif']}}}}</script>
  <style>
    body { font-family:'Be Vietnam Pro',system-ui,sans-serif; overflow:hidden; background:#f5f5f5; height:100vh; margin:0; }
    .gtag { transition:opacity .15s; }
    .gtag.off { opacity:.25; }
  </style>
</head>
<body>

<!-- Nav — same pattern as browse/compare -->
<nav class="bg-white border-b border-[#e5e5e5] px-6 py-3 flex items-center gap-4 relative z-[100]">
  <a href="{{ url_for('career.career_main') }}" class="text-sm text-gray-500 hover:text-gray-800 flex items-center gap-1.5">
    <i class="fas fa-arrow-left text-xs"></i> Phân tích năng lực
  </a>
  <span class="text-[#e5e5e5]">/</span>
  <span class="text-sm font-semibold text-gray-800">Bản đồ ngành</span>
  <div class="ml-auto flex items-center gap-3">
    <span class="text-sm text-gray-500">{{ student.name }}</span>
  </div>
</nav>

<!-- Filter bar — same pattern -->
<div class="bg-white border-b border-[#e5e5e5] px-4 py-2.5 relative z-[100]">
  <div class="flex flex-wrap gap-2.5 items-center">
    <div class="relative min-w-[180px] max-w-[220px]">
      <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
      <input type="text" id="mapSearch" placeholder="Tìm ngành hoặc trường..."
        class="w-full pl-8 pr-3 py-1.5 text-sm border border-[#e5e5e5] rounded-md focus:outline-none focus:border-blue-400">
    </div>
    <div id="groupFilters" class="flex flex-wrap gap-1.5"></div>
    <label class="flex items-center gap-1.5 cursor-pointer ml-1">
      <input type="checkbox" id="filterFitOnly" class="w-3.5 h-3.5 rounded border-gray-300 text-[#0070f3]">
      <span class="text-[11px] text-gray-500">Chỉ ngành phù hợp (>50%)</span>
    </label>
    <div class="flex gap-1.5 ml-auto">
      <button onclick="zoomIn()" class="text-xs px-2.5 py-1 border border-[#e5e5e5] rounded-md bg-white hover:bg-[#f0f0f0] font-medium text-gray-600">+</button>
      <button onclick="zoomOut()" class="text-xs px-2.5 py-1 border border-[#e5e5e5] rounded-md bg-white hover:bg-[#f0f0f0] font-medium text-gray-600">−</button>
      <button onclick="resetView()" class="text-xs px-2.5 py-1 border border-[#e5e5e5] rounded-md bg-white hover:bg-[#f0f0f0] font-medium text-gray-600">
        <i class="fas fa-undo text-[10px]"></i>
      </button>
    </div>
  </div>
</div>

<!-- Detail panel -->
<div id="detailPanel" class="fixed right-0 top-0 bottom-0 w-[300px] bg-white border-l border-[#e5e5e5] z-[90] hidden overflow-y-auto shadow-[-2px_0_8px_rgba(0,0,0,.04)]" style="padding-top:100px">
  <div class="px-4 pb-4">
    <button onclick="closePanel()" class="absolute top-[104px] right-3 text-gray-400 hover:text-gray-700">
      <i class="fas fa-times"></i>
    </button>
    <div class="font-semibold text-gray-900 text-sm" id="dpName"></div>
    <div class="text-[11px] text-gray-500 mb-2" id="dpUniversity"></div>
    <div class="flex gap-1.5 mb-3">
      <span id="dpBlock" class="text-[10px] px-2 py-0.5 rounded bg-[#f0f0f0] text-gray-700"></span>
      <span id="dpGroup" class="text-[10px] px-2 py-0.5 rounded bg-[#f0f0f0] text-gray-500"></span>
    </div>
    <div class="mb-2">
      <span id="dpFit" class="text-xl font-bold"></span>
      <span class="text-[11px] text-gray-400 ml-1">phù hợp</span>
    </div>
    <div class="text-xs text-gray-500 mb-3">Điểm chuẩn 2025: <strong id="dpScore" class="text-gray-900"></strong></div>
    <div class="border-t border-[#e5e5e5] pt-2 mb-3">
      <div class="text-[10px] text-gray-400 uppercase tracking-wide mb-1.5">Top môn yêu cầu</div>
      <div id="dpSubjects"></div>
    </div>
    <button onclick="addToCompare()"
      class="w-full text-xs py-1.5 border border-[#e5e5e5] rounded-md bg-white hover:bg-[#f0f0f0] font-medium text-gray-700 text-center">
      <i class="fas fa-plus mr-1"></i>Thêm so sánh
    </button>
  </div>
</div>

<!-- Legend -->
<div class="fixed bottom-3 left-3 z-[90] bg-white border border-[#e5e5e5] rounded-lg px-3.5 py-2.5 text-[10px] text-gray-500 space-y-1 shadow-sm">
  <div><span class="inline-block w-2 h-2 rounded-full bg-[#ef4444] mr-1.5 align-middle"></span><strong class="text-gray-700">Bạn</strong> — vị trí năng lực</div>
  <div><span class="inline-block w-2 h-2 rounded-full bg-gray-400 mr-1.5 align-middle"></span>Ngành — càng gần = càng phù hợp</div>
  <div><span class="inline-block w-2 h-2 rounded-full bg-blue-400/30 mr-1.5 align-middle"></span>Vùng cụm ngành</div>
</div>

<svg id="mapSvg" width="100%" height="100%" style="background:#f5f5f5">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <g id="mapG"></g>
</svg>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script>
const GC={
  'Kỹ thuật – Công nghệ':'#3b82f6',
  'Kinh tế – Quản trị':'#f59e0b',
  'Y Dược':'#10b981',
  'Xã hội – Nhân văn':'#8b5cf6',
  'Nghệ thuật':'#ec4899',
  'Khoa học':'#06b6d4',
  'Nông Lâm':'#84cc16',
  'Sư phạm':'#f97316',
  'Luật – Hành chính':'#6366f1'
};
const DC='#94a3b8';
let sim,svgEl,gEl,zoomB,curNode=null,allData=[],studentVec={};
let compareIds=new Set(JSON.parse(sessionStorage.getItem('compare_major_ids')||'[]'));

async function init(){
  const r=await fetch('/api/student/career/map-data');
  const data=await r.json();
  allData=data.majors;
  studentVec=data.student_vector||{};
  render(allData);
  buildFilters(allData);
}

function gc(g){return GC[g]||DC;}

function render(majors){
  const W=document.getElementById('mapSvg').clientWidth;
  const H=document.getElementById('mapSvg').clientHeight;
  const cx=W/2, cy=H/2;

  const groups=[...new Set(majors.map(m=>m.major_group).filter(Boolean))];
  const R=Math.min(W,H)*0.32;
  const gpos={};
  groups.forEach((g,i)=>{
    const a=(2*Math.PI*i)/groups.length - Math.PI/2;
    gpos[g]={x:cx+R*Math.cos(a), y:cy+R*Math.sin(a)};
  });

  // Student position: weighted average of group centers by fit
  let sx=0,sy=0,sw=0;
  majors.forEach(m=>{
    const p=gpos[m.major_group];
    if(!p)return;
    const w=m.fit_pct/100;
    sx+=p.x*w; sy+=p.y*w; sw+=w;
  });
  const studentX=sw?sx/sw:cx, studentY=sw?sy/sw:cy;

  const subjects=[...new Set(majors.flatMap(m=>Object.keys(m.weight_vector)))];
  const nodes=majors.map(m=>{
    const p=gpos[m.major_group]||{x:cx,y:cy};
    const fitFactor=m.fit_pct/100;
    const toStudent=0.15*fitFactor;
    const initX=p.x*(1-toStudent)+studentX*toStudent+(Math.random()-.5)*50;
    const initY=p.y*(1-toStudent)+studentY*toStudent+(Math.random()-.5)*50;
    return {...m, x:initX, y:initY};
  });

  const links=[];
  for(let i=0;i<nodes.length;i++)
    for(let j=i+1;j<nodes.length;j++){
      if(nodes[i].major_group!==nodes[j].major_group)continue;
      let dot=0,nA=0,nB=0;
      subjects.forEach(k=>{dot+=(nodes[i].weight_vector[k]||0)*(nodes[j].weight_vector[k]||0);nA+=(nodes[i].weight_vector[k]||0)**2;nB+=(nodes[j].weight_vector[k]||0)**2;});
      const s=nA&&nB?dot/(Math.sqrt(nA)*Math.sqrt(nB)):0;
      if(s>.55)links.push({source:nodes[i].id,target:nodes[j].id,strength:s});
    }

  svgEl=d3.select('#mapSvg'); gEl=d3.select('#mapG'); gEl.selectAll('*').remove();
  zoomB=d3.zoom().scaleExtent([.3,6]).on('zoom',e=>{
    gEl.attr('transform',e.transform);
    onZoom(e.transform.k);
  });
  svgEl.call(zoomB);

  const rS=d3.scaleLinear().domain([0,100]).range([5,16]).clamp(true);
  const cStr=.12;

  sim=d3.forceSimulation(nodes)
    .force('link',d3.forceLink(links).id(d=>d.id).distance(30).strength(d=>d.strength*.25))
    .force('charge',d3.forceManyBody().strength(-40))
    .force('cx',d3.forceX(d=>(gpos[d.major_group]||{x:cx}).x).strength(cStr))
    .force('cy',d3.forceY(d=>(gpos[d.major_group]||{y:cy}).y).strength(cStr))
    .force('col',d3.forceCollide(d=>rS(d.fit_pct)+3))
    .alphaDecay(.025);

  // Layers
  const hullLayer=gEl.append('g');
  const linkLayer=gEl.append('g');
  const labelLayer=gEl.append('g');
  const nodeLayer=gEl.append('g');
  const studentLayer=gEl.append('g');

  // Links
  linkLayer.selectAll('line').data(links).enter().append('line')
    .attr('stroke','#cbd5e1').attr('stroke-opacity',.2).attr('stroke-width',d=>d.strength*1.2);

  // Student node
  const stuG=studentLayer.append('g').attr('transform',`translate(${studentX},${studentY})`);
  stuG.append('circle').attr('r',20).attr('fill','#ef4444').attr('fill-opacity',.08).attr('stroke','none');
  stuG.append('circle').attr('r',12).attr('fill','#ef4444').attr('fill-opacity',.15).attr('stroke','none');
  stuG.append('circle').attr('r',6).attr('fill','#ef4444').attr('stroke','#fff').attr('stroke-width',2).attr('filter','url(#glow)');
  stuG.append('text').attr('dy',-12).attr('text-anchor','middle')
    .attr('font-size','10px').attr('fill','#ef4444').attr('font-weight','600').text('Bạn');

  // Proximity lines from student to nearby majors
  const proxLines=studentLayer.selectAll('.prox-line').data(nodes.filter(n=>n.fit_pct>=60)).enter()
    .append('line').attr('class','prox-line')
    .attr('stroke','#ef4444').attr('stroke-opacity',d=>(d.fit_pct/100)*.2)
    .attr('stroke-width',.8).attr('stroke-dasharray','3 3');

  // Cluster labels
  const clLabels=labelLayer.selectAll('text').data(groups).enter().append('text')
    .attr('text-anchor','middle').attr('font-size','12px').attr('font-weight','600')
    .attr('fill',d=>gc(d)).attr('fill-opacity',.7).text(d=>d);

  // Major nodes
  const node=nodeLayer.selectAll('g').data(nodes).enter().append('g')
    .style('cursor','pointer')
    .call(d3.drag()
      .on('start',(e,d)=>{if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y;})
      .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y;})
      .on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}))
    .on('click',(e,d)=>showDetail(d));

  node.append('circle').attr('class','node-circle')
    .attr('r',d=>rS(d.fit_pct))
    .attr('fill',d=>gc(d.major_group)).attr('fill-opacity',.6);

  node.append('text').attr('class','node-name')
    .attr('dy',d=>rS(d.fit_pct)+10).attr('text-anchor','middle')
    .attr('font-size','8px').attr('fill','#4b5563')
    .text(d=>d.name.length>16?d.name.slice(0,15)+'…':d.name)
    .style('display','none');

  function updateHulls(){
    hullLayer.selectAll('path').remove();
    groups.forEach(g=>{
      const pts=nodes.filter(d=>d.major_group===g).map(d=>[d.x,d.y]);
      if(pts.length<3)return;
      const hull=d3.polygonHull(pts);
      if(!hull)return;
      const pad=expand(hull,25);
      hullLayer.append('path').attr('d','M'+pad.join('L')+'Z')
        .attr('fill',gc(g)).attr('fill-opacity',.05)
        .attr('stroke',gc(g)).attr('stroke-opacity',.15).attr('stroke-width',1).attr('stroke-dasharray','4 2');
    });
  }

  sim.on('tick',()=>{
    linkLayer.selectAll('line')
      .attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
      .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    node.attr('transform',d=>`translate(${d.x},${d.y})`);
    proxLines.attr('x1',studentX).attr('y1',studentY).attr('x2',d=>d.x).attr('y2',d=>d.y);

    clLabels.each(function(g){
      const pts=nodes.filter(n=>n.major_group===g);
      if(!pts.length)return;
      const ax=d3.mean(pts,p=>p.x), minY=d3.min(pts,p=>p.y);
      d3.select(this).attr('x',ax).attr('y',minY-18);
    });
    updateHulls();
  });
}

function expand(hull,pad){
  const cx=d3.mean(hull,p=>p[0]),cy=d3.mean(hull,p=>p[1]);
  return hull.map(p=>{
    const dx=p[0]-cx,dy=p[1]-cy,len=Math.sqrt(dx*dx+dy*dy)||1;
    return [p[0]+dx/len*pad,p[1]+dy/len*pad];
  });
}

let curZoom=1;
function onZoom(k){
  curZoom=k;
  gEl.selectAll('.node-name').style('display',k>1.3?'block':'none');
  gEl.selectAll('.prox-line').style('display',k>1.5?'none':'block');
}

function showDetail(d){
  curNode=d;
  gEl.selectAll('.node-circle').attr('stroke','#fff').attr('stroke-width',1.5);
  gEl.selectAll('.node-circle').filter(n=>n.id===d.id).attr('stroke','#111827').attr('stroke-width',2.5);
  document.getElementById('dpName').textContent=d.name;
  document.getElementById('dpUniversity').textContent=d.university;
  document.getElementById('dpBlock').textContent=d.admission_block||'—';
  document.getElementById('dpGroup').textContent=d.major_group||'—';
  const fitEl=document.getElementById('dpFit');
  fitEl.textContent=Math.round(d.fit_pct)+'%';
  fitEl.style.color=d.fit_pct>=80?'#059669':d.fit_pct>=60?'#d97706':'#dc2626';
  document.getElementById('dpScore').textContent=d.entry_score||'—';
  const sDiv=document.getElementById('dpSubjects');sDiv.innerHTML='';
  Object.entries(d.weight_vector).sort((a,b)=>b[1]-a[1]).slice(0,5).forEach(([s,w])=>{
    const el=document.createElement('div');
    el.style.cssText='font-size:11px;color:#374151;margin-bottom:3px;display:flex;justify-content:space-between';
    el.innerHTML=`<span>${s}</span><span style="color:#9ca3af">${(w*100).toFixed(0)}%</span>`;
    sDiv.appendChild(el);
  });
  document.getElementById('detailPanel').classList.remove('hidden');
}
function closePanel(){
  document.getElementById('detailPanel').classList.add('hidden');
  gEl.selectAll('.node-circle').attr('stroke','#fff').attr('stroke-width',1.5);
  curNode=null;
}

function addToCompare(){
  if(!curNode)return;
  if(compareIds.size>=4){alert('Tối đa 4 ngành');return;}
  compareIds.add(curNode.id);
  sessionStorage.setItem('compare_major_ids',JSON.stringify([...compareIds]));
  alert('Đã thêm "'+curNode.name+'" vào so sánh ('+compareIds.size+'/4)');
}

function buildFilters(majors){
  const groups=[...new Set(majors.map(m=>m.major_group).filter(Boolean))];
  const c=document.getElementById('groupFilters');c.innerHTML='';
  groups.forEach(g=>{
    const tag=document.createElement('span');
    tag.className='gtag text-[10px] px-2 py-0.5 rounded-full cursor-pointer font-medium border';
    const col=gc(g);
    tag.style.background=col+'15';tag.style.color=col;tag.style.borderColor=col+'40';
    tag.dataset.active='1';tag.dataset.group=g;tag.textContent=g;
    tag.onclick=()=>{
      const on=tag.dataset.active==='1';
      tag.dataset.active=on?'0':'1';
      tag.classList.toggle('off',on);
      applyFilters();
    };
    c.appendChild(tag);
  });
}

function applyFilters(){
  const off=new Set([...document.querySelectorAll('.gtag[data-active="0"]')].map(b=>b.dataset.group));
  let f=allData;
  const q=document.getElementById('mapSearch').value.toLowerCase();
  if(q)f=f.filter(m=>(m.name+m.university).toLowerCase().includes(q));
  if(document.getElementById('filterFitOnly').checked)f=f.filter(m=>m.fit_pct>50);
  if(off.size)f=f.filter(m=>!off.has(m.major_group));
  if(sim)sim.stop();
  render(f);
}

let sT;
document.getElementById('mapSearch').addEventListener('input',()=>{clearTimeout(sT);sT=setTimeout(applyFilters,350);});
document.getElementById('filterFitOnly').addEventListener('change',applyFilters);

function zoomIn(){svgEl.transition().duration(250).call(zoomB.scaleBy,1.4);}
function zoomOut(){svgEl.transition().duration(250).call(zoomB.scaleBy,.7);}
function resetView(){svgEl.transition().duration(400).call(zoomB.transform,d3.zoomIdentity);}

init();
</script>
</body>
</html>
